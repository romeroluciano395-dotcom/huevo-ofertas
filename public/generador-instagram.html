<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>🥚 Generador de placas para Instagram — Huevo Ofertas</title>
<style>
  :root{
    --amarillo:#ffe600; --azul:#3483fa; --azul-osc:#2968c8;
    --rojo:#e63946; --texto:#1a1a1a; --suave:#6b7280; --borde:#e6e8eb;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
  body{background:#f4f5f7;color:var(--texto);padding:16px;line-height:1.5}
  h1{font-size:1.3rem;margin-bottom:4px}
  .sub{color:var(--suave);margin-bottom:20px;font-size:.92rem}
  .wrap{display:grid;grid-template-columns:380px 1fr;gap:28px;max-width:1000px;margin:0 auto;align-items:start}
  @media(max-width:860px){.wrap{grid-template-columns:1fr;gap:20px}}
  .panel{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  label{display:block;font-size:.85rem;font-weight:600;margin-bottom:14px;color:#444}
  input[type=text],input[type=number],input[type=url]{width:100%;padding:10px 11px;margin-top:4px;
    border:1px solid var(--borde);border-radius:8px;font-size:1rem}
  .fila{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .check{display:flex;align-items:center;gap:8px;font-weight:500}
  .check input{width:auto;transform:scale(1.2)}
  .btn{border:none;border-radius:8px;padding:14px 18px;font-size:1rem;font-weight:700;
    cursor:pointer;color:#fff;width:100%;margin-top:6px}
  .btn-azul{background:var(--azul)} .btn-azul:hover{background:var(--azul-osc)}
  .btn-subir{background:var(--verde,#00a650);display:block;text-align:center}
  input[type=file]{display:none}
  .previewbox{text-align:center}
  canvas{width:100%;max-width:420px;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.15);
    background:#fff;touch-action:none;cursor:grab}
  canvas:active{cursor:grabbing}
  .hint{font-size:.8rem;color:var(--suave);margin-top:10px}
  .err{color:var(--rojo);font-size:.85rem;margin-top:8px;min-height:1em}
  .sep{display:flex;align-items:center;gap:10px;color:var(--suave);font-size:.8rem;margin:14px 0}
  .sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--borde)}
  .zoombox{margin-top:14px;padding-top:14px;border-top:1px solid var(--borde)}
  input[type=range]{width:100%}
  .mini{background:#eee;border:none;border-radius:6px;padding:8px 12px;font-size:.85rem;
    cursor:pointer;font-weight:600;margin-top:8px;width:100%}
</style>
</head>
<body>
  <h1>🥚 Generador de placas para Instagram</h1>
  <p class="sub">Subí la foto del producto, poné el precio y descargá la placa lista (1080×1080).</p>

  <div class="wrap">
    <div class="panel">
      <!-- Opción 1: subir archivo -->
      <label for="f-archivo" class="btn btn-subir" style="background:#00a650;cursor:pointer">
        📷 Subir foto o captura del celular
      </label>
      <input type="file" id="f-archivo" accept="image/*" />

      <div class="sep">o si tenés la URL</div>

      <label>URL de la foto (de Mercado Libre)
        <input type="url" id="f-img" placeholder="https://http2.mlstatic.com/...webp" />
      </label>

      <!-- Encuadre -->
      <div class="zoombox">
        <label>Zoom (para encuadrar la captura)
          <input type="range" id="f-zoom" min="0.4" max="3" step="0.05" value="1" />
        </label>
        <p class="hint" style="margin-top:-8px">Arrastrá la imagen en la vista previa para moverla.</p>
        <button class="mini" id="btn-centrar">↺ Centrar imagen</button>
      </div>

      <div class="sep">datos del producto</div>

      <label>Título del producto
        <input type="text" id="f-titulo" placeholder="Auriculares Xiaomi Redmi Buds 6" />
      </label>
      <div class="fila">
        <label>Precio
          <input type="number" id="f-precio" placeholder="23999" />
        </label>
        <label>Precio anterior <span style="color:#999;font-weight:400">(opcional)</span>
          <input type="number" id="f-anterior" placeholder="39999" />
        </label>
      </div>
      <label class="check"><input type="checkbox" id="f-bio" checked /> Mostrar "Link en la bio"</label>

      <button class="btn btn-azul" id="btn-descargar">⬇️ Descargar placa (PNG)</button>
      <div class="err" id="err"></div>
    </div>

    <div class="previewbox">
      <canvas id="lienzo" width="1080" height="1080"></canvas>
      <p class="hint">Vista previa en vivo — arrastrá la foto para encuadrarla.</p>
    </div>
  </div>

<script>
const $=id=>document.getElementById(id);
const cv=$('lienzo'), ctx=cv.getContext('2d');
let img=null, zoom=1, offX=0, offY=0;

// Zona de la tarjeta blanca donde va la imagen
const CARD={x:60,y:190,w:960,h:560,r:24};

function fmt(v){
  v=Number(v)||0;
  return v.toLocaleString('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0});
}

function redondear(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}

function wrap(texto,x,y,maxW,lh,maxLineas){
  const palabras=texto.split(' ');let linea='',lineas=[];
  for(const p of palabras){
    const test=linea?linea+' '+p:p;
    if(ctx.measureText(test).width>maxW && linea){lineas.push(linea);linea=p;}
    else linea=test;
  }
  if(linea)lineas.push(linea);
  lineas=lineas.slice(0,maxLineas);
  lineas.forEach((l,i)=>ctx.fillText(l,x,y+i*lh));
  return lineas.length;
}

function cargarDesdeURL(url){
  return new Promise(res=>{
    if(!url){img=null;return res();}
    const i=new Image();
    i.crossOrigin='anonymous';i.referrerPolicy='no-referrer';
    i.onload=()=>{img=i;centrar();res();};
    i.onerror=()=>{img=null;res();};
    i.src=url;
  });
}

function centrar(){zoom=1;offX=0;offY=0;$('f-zoom').value=1;}

function dibujar(){
  const titulo=$('f-titulo').value||'Título del producto';
  const precio=$('f-precio').value;
  const anterior=$('f-anterior').value;
  const bio=$('f-bio').checked;
  const tieneDesc=anterior && Number(anterior)>Number(precio);
  const pct=tieneDesc?Math.round((1-Number(precio)/Number(anterior))*100):0;

  ctx.fillStyle='#f4f5f7';ctx.fillRect(0,0,1080,1080);

  // Barra superior
  ctx.fillStyle='#ffe600';ctx.fillRect(0,0,1080,150);
  ctx.fillStyle='#1a1a1a';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='700 60px Segoe UI, system-ui, sans-serif';
  ctx.fillText('🥚 Huevo Ofertas',540,78);

  // Tarjeta blanca + imagen recortada dentro
  ctx.fillStyle='#fff';redondear(CARD.x,CARD.y,CARD.w,CARD.h,CARD.r);ctx.fill();
  if(img){
    ctx.save();
    redondear(CARD.x,CARD.y,CARD.w,CARD.h,CARD.r);ctx.clip();
    const pad=40;
    const base=Math.min((CARD.w-pad*2)/img.width,(CARD.h-pad*2)/img.height);
    const esc=base*zoom;
    const w=img.width*esc, h=img.height*esc;
    const cx=CARD.x+CARD.w/2+offX, cy=CARD.y+CARD.h/2+offY;
    ctx.drawImage(img,cx-w/2,cy-h/2,w,h);
    ctx.restore();
  }else{
    ctx.fillStyle='#c9ccd1';ctx.font='400 34px Segoe UI';
    ctx.fillText('Subí una foto 📷',540,470);
  }

  // Badge descuento
  if(tieneDesc){
    ctx.fillStyle='#e63946';ctx.beginPath();ctx.arc(940,300,78,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='800 46px Segoe UI';ctx.fillText('-'+pct+'%',940,300);
  }

  // Título
  ctx.fillStyle='#1a1a1a';ctx.font='600 44px Segoe UI, system-ui, sans-serif';
  const n=wrap(titulo,540,830,940,54,2);

  // Precios
  const yP = n>1 ? 960 : 930;
  if(tieneDesc){
    ctx.fillStyle='#9aa0a6';ctx.font='400 36px Segoe UI';
    ctx.fillText(fmt(anterior),540,yP-6);
    const w=ctx.measureText(fmt(anterior)).width;
    ctx.strokeStyle='#9aa0a6';ctx.lineWidth=3;ctx.beginPath();
    ctx.moveTo(540-w/2,yP-6);ctx.lineTo(540+w/2,yP-6);ctx.stroke();
  }
  ctx.fillStyle='#3483fa';ctx.font='800 96px Segoe UI, system-ui, sans-serif';
  ctx.fillText(fmt(precio||0),540,yP+58);

  // CTA
  if(bio){
    ctx.fillStyle='#3483fa';ctx.fillRect(0,980,1080,100);
    ctx.fillStyle='#fff';ctx.font='700 42px Segoe UI, system-ui, sans-serif';
    ctx.fillText('🔗 Link en la bio para comprar',540,1032);
  }
}

// --- Subir archivo desde el celular ---
$('f-archivo').addEventListener('change',(e)=>{
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    const i=new Image();
    i.onload=()=>{img=i;centrar();dibujar();$('err').textContent='';};
    i.onerror=()=>{$('err').textContent='No se pudo leer esa imagen.';};
    i.src=ev.target.result;
  };
  reader.readAsDataURL(file);
});

// --- URL ---
$('f-img').addEventListener('input',async()=>{
  const url=$('f-img').value.trim();
  await cargarDesdeURL(url);
  $('err').textContent=(url&&!img)?'No se pudo cargar esa imagen. Revisá la URL.':'';
  dibujar();
});

// --- Zoom ---
$('f-zoom').addEventListener('input',(e)=>{zoom=parseFloat(e.target.value);dibujar();});
$('btn-centrar').addEventListener('click',()=>{centrar();dibujar();});

// --- Arrastrar para mover ---
let drag=false,lastX=0,lastY=0;
function pos(e){
  const r=cv.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return {x:(t.clientX-r.left)*(1080/r.width), y:(t.clientY-r.top)*(1080/r.height)};
}
function inicio(e){if(!img)return;drag=true;const p=pos(e);lastX=p.x;lastY=p.y;e.preventDefault();}
function mover(e){
  if(!drag)return;
  const p=pos(e);offX+=p.x-lastX;offY+=p.y-lastY;lastX=p.x;lastY=p.y;
  dibujar();e.preventDefault();
}
function fin(){drag=false;}
cv.addEventListener('mousedown',inicio);cv.addEventListener('mousemove',mover);
window.addEventListener('mouseup',fin);
cv.addEventListener('touchstart',inicio,{passive:false});
cv.addEventListener('touchmove',mover,{passive:false});
cv.addEventListener('touchend',fin);

['f-titulo','f-precio','f-anterior'].forEach(id=>$(id).addEventListener('input',dibujar));
$('f-bio').addEventListener('change',dibujar);

$('btn-descargar').addEventListener('click',()=>{
  try{
    const a=document.createElement('a');
    a.download=('huevo-ofertas-'+($('f-titulo').value||'producto')).toLowerCase()
      .replace(/[^a-z0-9]+/g,'-').slice(0,40)+'.png';
    a.href=cv.toDataURL('image/png');
    a.click();
  }catch(e){
    $('err').textContent='No se pudo descargar. Probá con otra foto.';
  }
});

dibujar();
</script>
</body>
</html>
